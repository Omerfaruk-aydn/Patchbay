name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build and push gateway image
        run: |
          docker build -t patchbay-gateway apps/gateway
          # docker tag and push to registry here

      - name: Build and push dashboard image
        run: |
          docker build -t patchbay-dashboard apps/dashboard
          # docker tag and push to registry here

      # Add k8s apply or terraform apply here for production
