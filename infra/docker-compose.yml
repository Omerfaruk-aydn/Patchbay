services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: patchbay
      POSTGRES_USER: patchbay
      POSTGRES_PASSWORD: patchbay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchbay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../apps/gateway
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://patchbay:patchbay@postgres:5432/patchbay
      REDIS_URL: redis://redis:6379/0

  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8000
      NEXT_PUBLIC_WS_URL: ws://gateway:8000

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  tempo:
    image: grafana/tempo
    ports:
      - "3200:3200"

volumes:
  pgdata:
