services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: patchbay
      POSTGRES_USER: patchbay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchbay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../apps/gateway
      dockerfile: Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://patchbay:${POSTGRES_PASSWORD}@postgres:5432/patchbay
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    restart: unless-stopped

  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
      target: production
    depends_on:
      - gateway
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL}
    restart: unless-stopped

volumes:
  pgdata:
